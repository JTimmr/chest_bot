version: '3.8'

services:
  chest-bot:
    build: .
    container_name: chest-discord-bot
    restart: unless-stopped
    env_file:
      - .env
    ports:
      # Expose the REST API (only when API_KEY is set in .env)
      - "127.0.0.1:${API_PORT:-8000}:$API_PORT:-8000"
    volumes:
      # Mount .env file if you want to update it without rebuilding
      - ./.env:/app/.env:ro
      # Persist databases in a named volume (reset with `docker compose down -v`)
      - chest_bot_data:/app/data

volumes:
  chest_bot_data:
